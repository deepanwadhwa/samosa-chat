name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Confirm the runner architecture
        run: |
          uname -a

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libomp
          python3 -m pip install --break-system-packages numpy || true

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libomp-dev gcc clang
          python3 -m pip install numpy || true

      - name: Build (portable)
        run: make

      - name: Build (multithreaded)
        run: make omp

      # The suite is self-contained: it stubs the engine and the network, and
      # uses tiny fixtures rather than the 24 GB model, so it runs on a clean
      # runner with no download.
      - name: Test
        run: make test

      - name: Test inside Debian bookworm container (Debian validation)
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace debian:bookworm-slim sh -c "
            apt-get update && apt-get install -y make gcc libomp-dev curl python3 &&
            make test
          "
